services:
  moderation-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-moderation-bot
    env_file:
      - .env
    environment:
      LOG_DIR: /app/logs
      LOG_FILE: bot.log
      LOG_LEVEL: INFO
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
